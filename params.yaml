# General settings
base:
  random_state: 42
  target_col: "target"

# Model specific hyperparameters
lasso:
  alpha: 0.1
  max_iter: 1000
  c: 0.01
  solver: 'saga'

random_forest:
  n_estimators: 100
  max_depth: 10
  min_samples_split: 2

xgboost:
  n_estimators: 200
  learning_rate: 0.05
  max_depth: 6
  tree_method: "hist"  